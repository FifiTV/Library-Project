<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
        }
        form {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
            width: 100%;
        }
        button:hover {
            background-color: #218838;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <form id="login-form" method="post">
        <h2>Login</h2>
        <div id="error-message" class="error"></div>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <script>
        // Get elements
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        // Login form submission
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault(); // Prevent form from submitting the traditional way

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Send the login data to the server
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Login failed: ' + response.statusText);
                }
                return response.json(); // Assuming your server returns JSON
            })
            .then(data => {
                // Handle successful login (you can redirect or update the UI)
                console.log("Login successful:", data);
                window.location.href = '/logged'; // Redirect to the logged page
            })
            .catch((error) => {
                console.error("Login error:", error);
                errorMessage.textContent = error.message; // Display error message
            });
        });
    </script>
</body>
</html>
